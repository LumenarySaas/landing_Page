<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumenary — Landing Page Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Architects+Daughter&display=swap" rel="stylesheet" />
<style>
:root{
  --gap:1;
  --sketch: 255px 15px 225px 15px/15px 225px 15px 255px;
  --sketch2: 15px 225px 15px 255px/225px 15px 255px 15px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:"Kalam",cursive;background:#cfcabb;color:#2a2823;-webkit-font-smoothing:antialiased;line-height:1.5}

/* ---------- THEME TOKENS ---------- */
.theme-light{
  --paper:#f4f1e8; --panel:#fffdf6; --panel2:#f0ecdf;
  --ink:#2c2a24; --ink-soft:#6c685d; --ink-dim:#9b9686;
  --greek:rgba(44,42,36,.13); --line:#2c2a24; --line-soft:rgba(44,42,36,.32);
  --note:#fdf3c4; --note-ink:#5b4a16; --note-line:#d9c25f;
}
.theme-dark{
  --paper:#17150f; --panel:#211e16; --panel2:#2a2619;
  --ink:#ece7d8; --ink-soft:#a39d8c; --ink-dim:#736e60;
  --greek:rgba(236,231,216,.15); --line:#ece7d8; --line-soft:rgba(236,231,216,.32);
  --note:#37301a; --note-ink:#e9d590; --note-line:#7a6a30;
}

/* ---------- APP CHROME ---------- */
#root{min-height:100vh}
.stage{min-height:100vh;background:var(--paper);transition:background .3s}
.topbar{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:2px dashed var(--line-soft)}
.topbar-in{max-width:1280px;margin:0 auto;padding:14px 26px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.tb-brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:21px;color:var(--ink);letter-spacing:-.01em}
.tb-brand .glyph{width:24px;height:24px;border:2px solid var(--accent);border-radius:var(--sketch);display:grid;place-items:center;color:var(--accent);font-size:13px;transform:rotate(-4deg)}
.tb-tag{font-family:"Architects Daughter",cursive;font-size:12px;color:var(--ink-soft);background:var(--panel);border:1.5px solid var(--line-soft);border-radius:var(--sketch2);padding:3px 10px;transform:rotate(-.5deg)}
.tabs{display:flex;gap:9px;margin-left:auto;flex-wrap:wrap}
.tab{font-family:"Kalam";font-size:14.5px;font-weight:700;color:var(--ink-soft);background:transparent;border:2px solid var(--line-soft);border-radius:var(--sketch);padding:7px 15px;cursor:pointer;transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--ink);border-color:var(--line);transform:translateY(-1px)}
.tab.on{color:var(--ink);border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
.tab .k{color:var(--accent);margin-right:5px}
.approach-desc{max-width:1280px;margin:0 auto;padding:10px 26px 0;display:flex;align-items:center;gap:12px}
.approach-desc .ab{font-weight:700;font-size:15px;color:var(--accent)}
.approach-desc .at{font-family:"Architects Daughter";font-size:14.5px;color:var(--ink-soft)}

/* ---------- BROWSER FRAME ---------- */
.scrollwrap{max-width:1280px;margin:0 auto;padding:22px 26px 90px}
.browser{background:var(--panel);border:2.5px solid var(--line);border-radius:18px 18px 14px 14px;overflow:hidden;box-shadow:10px 12px 0 -2px var(--line-soft)}
.browser-bar{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:2px solid var(--line-soft);background:var(--panel2)}
.browser-bar .dot{width:11px;height:11px;border:1.5px solid var(--line);border-radius:50%}
.browser-bar .url{margin-left:14px;flex:1;max-width:340px;font-family:"Architects Daughter";font-size:12.5px;color:var(--ink-soft);background:var(--paper);border:1.5px solid var(--line-soft);border-radius:8px;padding:4px 12px}
.canvas{background:var(--paper)}

/* ---------- PRIMITIVES ---------- */
.wf-nav{display:flex;align-items:center;justify-content:space-between;padding:20px 46px;border-bottom:2px dashed var(--line-soft)}
.wf-nav .ln{display:flex;gap:26px}
.wf-nav .lk{font-size:14px;color:var(--ink-soft)}
.wf-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:19px;color:var(--ink)}
.wf-brand .g{width:21px;height:21px;border:2px solid var(--accent);border-radius:var(--sketch);transform:rotate(-4deg)}

.sec{padding:calc(46px * var(--gap)) 46px;position:relative}
.sec + .sec{border-top:2px dashed var(--line-soft)}
.tag{display:inline-block;font-family:"Architects Daughter";font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);border:1.5px solid var(--accent);border-radius:var(--sketch2);padding:2px 9px;margin-bottom:16px;transform:rotate(-.6deg)}
.h-xl{font-family:"Kalam";font-weight:700;color:var(--ink);font-size:clamp(34px,5vw,58px);line-height:1.04;letter-spacing:-.01em}
.h-lg{font-family:"Kalam";font-weight:700;color:var(--ink);font-size:clamp(26px,3.4vw,40px);line-height:1.08}
.h-md{font-family:"Kalam";font-weight:700;color:var(--ink);font-size:21px;line-height:1.15}
.sub{font-family:"Architects Daughter";color:var(--ink-soft);font-size:clamp(15px,1.5vw,18px);max-width:42ch;margin-top:14px}

/* greeked text */
.greek{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.greek i{display:block;height:9px;border-radius:6px;background:var(--greek)}
.greek.sm i{height:7px}

/* placeholder visual */
.ph{position:relative;background:var(--panel);border:2px solid var(--line);border-radius:var(--sketch);overflow:hidden}
.ph::before,.ph::after{content:"";position:absolute;inset:0;border-color:var(--line-soft)}
.ph::before{border-top:2px solid var(--line-soft);transform:rotate(0);background:
  linear-gradient(to top right,transparent calc(50% - 1.2px),var(--line-soft),transparent calc(50% + 1.2px)),
  linear-gradient(to top left,transparent calc(50% - 1.2px),var(--line-soft),transparent calc(50% + 1.2px));}
.ph .pl{position:absolute;bottom:10px;left:12px;font-family:"Architects Daughter";font-size:12px;color:var(--ink-soft);background:var(--paper);padding:2px 8px;border-radius:6px;border:1.3px solid var(--line-soft)}

.btn{display:inline-flex;align-items:center;gap:8px;font-family:"Kalam";font-weight:700;font-size:15px;padding:11px 20px;border-radius:var(--sketch);cursor:default;border:2px solid var(--line)}
.btn.fill{background:var(--accent);border-color:var(--accent);color:#fff}
.theme-dark .btn.fill{color:#17150f}
.btn.ghost{background:transparent;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:"Architects Daughter";font-size:12.5px;color:var(--ink-soft);border:1.5px solid var(--line-soft);border-radius:100px;padding:4px 12px;background:var(--panel)}
.chip.on{color:var(--accent);border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--accent)}

.card{background:var(--panel);border:2px solid var(--line);border-radius:var(--sketch);padding:22px}
.card.alt{border-radius:var(--sketch2)}
.icbox{width:42px;height:42px;border:2px solid var(--line);border-radius:var(--sketch2);display:grid;place-items:center;color:var(--accent);font-family:"Architects Daughter";font-size:15px;margin-bottom:14px}

/* sticky note annotation */
.note{position:relative;background:var(--note);color:var(--note-ink);border:1.5px solid var(--note-line);border-radius:3px;padding:13px 15px;font-family:"Architects Daughter";font-size:13.5px;line-height:1.45;box-shadow:3px 4px 0 -1px rgba(0,0,0,.13);max-width:300px}
.note b{font-family:"Kalam";font-weight:700}
.note::before{content:"";position:absolute;top:-9px;left:50%;width:46px;height:16px;transform:translateX(-50%) rotate(-3deg);background:color-mix(in srgb,var(--accent) 38%,transparent);border:1px solid var(--note-line);border-radius:2px;opacity:.75}
.note-tilt-l{transform:rotate(-1.6deg)}
.note-tilt-r{transform:rotate(1.6deg)}
.notes-off .note{display:none}

/* metrics band — always dark for contrast */
.band{background:#16140d;color:#f2efe4;border:2px solid #16140d;border-radius:var(--sketch);padding:40px;margin:6px 0}
.theme-dark .band{background:#0c0b07;border-color:#39342a}
.band .bgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;text-align:center}
.band .bv{font-family:"Kalam";font-weight:700;font-size:clamp(30px,3.8vw,46px);color:var(--accent);line-height:1}
.band .bk{font-family:"Architects Daughter";font-size:12.5px;letter-spacing:.06em;color:rgba(242,239,228,.62);margin-top:9px}

/* grids */
.grid{display:grid;gap:18px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:44px;align-items:center}
.flex{display:flex}
.between{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.center{text-align:center}
.mx{margin-left:auto;margin-right:auto}
.mt8{margin-top:8px}.mt14{margin-top:14px}.mt20{margin-top:20px}.mt28{margin-top:28px}
.gapc{display:flex;gap:11px;flex-wrap:wrap}
.rich-only{display:revert}
.d-sparse .rich-only{display:none}
.muted{color:var(--ink-soft)}
.fa-row{border-top:2px dashed var(--line-soft);padding:18px 0}
.fa-row:first-child{border-top:none}

@media(max-width:860px){
  .hero-grid{grid-template-columns:1fr;gap:28px}
  .g4,.g5,.g3{grid-template-columns:1fr 1fr}
  .band .bgrid{grid-template-columns:1fr 1fr;gap:22px}
  .wf-nav .ln{display:none}
}
@media(max-width:560px){
  .g2,.g4,.g5,.g3{grid-template-columns:1fr}
  .band .bgrid{grid-template-columns:1fr}
  .sec{padding:34px 22px}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="wf-sections.jsx"></script>
<script type="text/babel" src="wf-app.jsx"></script>
</body>
</html>
